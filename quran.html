<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>القرآن الكريم - اذكار</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<nav class="navbar">
  <div class="nav-container">
    <div class="nav-brand"><a href="index.html"><i class="fas fa-mosque"></i> اذكار</a></div>
    <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html"><i class="fas fa-home"></i> الرئيسية</a></li>
      <li><a href="azkar.html"><i class="fas fa-pray"></i> الأذكار</a></li>
      <li><a href="quran.html" class="active"><i class="fas fa-quran"></i> القرآن الكريم</a></li>
      <li><a href="hadith.html"><i class="fas fa-book-open"></i> الحديث</a></li>
      <li><a href="prayer.html"><i class="fas fa-clock"></i> مواقيت الصلاة</a></li>
      <li><a href="tasbih.html"><i class="fas fa-circle-dot"></i> السبحة</a></li>
      <li><a href="names.html"><i class="fas fa-star"></i> أسماء الله</a></li>
    </ul>
  </div>
</nav>

<div class="page-header">
  <h1><i class="fas fa-quran"></i> القرآن الكريم</h1>
</div>

<section class="container" style="padding:2rem 1rem">
  <div class="quran-layout">
    <!-- Surah List -->
    <div class="surah-sidebar">
      <input type="text" id="surahSearch" placeholder="🔍 ابحث عن سورة..." class="search-input">
      <div class="surah-list" id="surahList">جارٍ التحميل...</div>
    </div>
    <!-- Surah Content -->
    <div class="surah-content">
      <div class="surah-header" id="surahHeader"></div>
      <div class="quran-controls">
        <label>حجم الخط: <span id="qFontVal">28</span></label>
        <input type="range" id="qFontRange" min="20" max="50" value="28">
        <button id="qTafsirToggle" class="ctrl-btn"><i class="fas fa-book"></i> التفسير</button>
        <button id="qPlayBtn" class="ctrl-btn"><i class="fas fa-play"></i> تلاوة</button>
        <button onclick="window.print()" class="ctrl-btn"><i class="fas fa-print"></i> طباعة</button>
      </div>
      <div class="ayat-container" id="ayatContainer">
        <div class="welcome-quran">
          <div class="bismillah-big">﷽</div>
          <p>اختر سورة من القائمة لتبدأ القراءة</p>
        </div>
      </div>
      <audio id="quranAudio" controls style="width:100%;margin-top:1rem;display:none"></audio>
    </div>
  </div>
</section>

<footer class="footer"><div class="container"><p>اذكار &copy; 2025 — بيانات القرآن من Al-Quran Cloud API</p></div><p style='margin-top: 1rem; color: var(--accent-color); font-weight: bold; text-align: center; font-size: 1.1rem; padding-bottom: 1rem;'>اجر ساري لام وقاص</p>
</footer>
<script src="js/quran.js"></script>
</body>
</html>
